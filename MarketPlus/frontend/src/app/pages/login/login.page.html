<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-scale">
            <div class="auth-header">
                <a routerLink="/" class="auth-logo">
                    <span class="material-icons">storefront</span>
                    <span>Market<span class="highlight">Plus</span></span>
                </a>
                <h2>Bienvenido de nuevo</h2>
                <p>Inicia sesion para continuar comprando</p>
            </div>

            <form (ngSubmit)="login()" class="auth-form">
                <div *ngIf="error" class="alert-error">
                    <span class="material-icons">error</span>
                    <p>{{ error }}</p>
                </div>

                <div class="form-group">
                    <label for="identifier" class="form-label">Email o nombre de usuario</label>
                    <div class="input-icon">
                        <span class="material-icons">person</span>
                        <input id="identifier" type="text" [(ngModel)]="identifier" name="identifier" class="form-control" placeholder="tu@email.com o usuario_123" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-icon">
                        <span class="material-icons">lock</span>
                        <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                        <button type="button" (click)="showPassword = !showPassword" class="toggle-password">
                            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a routerLink="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-small"></span>
                    {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
                </button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a routerLink="/register">Registrate aqui</a></p>
            </div>
        </div>
    </div>
</div>
