<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-scale">
            <div class="auth-header">
                <a routerLink="/" class="auth-logo">
                    <span class="material-icons">storefront</span>
                    <span>Market<span class="highlight">Plus</span></span>
                </a>
                <h2>Recuperar Contraseña</h2>
                <p *ngIf="step === 'email'">Ingresa tu email para recibir instrucciones</p>
                <p *ngIf="step === 'reset'">Ingresa el token y tu nueva contraseña</p>
            </div>

            <form *ngIf="step === 'email'" (ngSubmit)="sendEmail()" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" [(ngModel)]="email" name="email" class="form-control" placeholder="tu@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
                    {{ loading ? 'Enviando...' : 'Enviar Instrucciones' }}
                </button>
            </form>

            <form *ngIf="step === 'reset'" (ngSubmit)="resetPassword()" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Token de recuperación</label>
                    <input type="text" [(ngModel)]="resetToken" name="token" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password" [(ngModel)]="newPassword" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
                    {{ loading ? 'Guardando...' : 'Restablecer Contraseña' }}
                </button>
            </form>

            <div class="auth-footer">
                <p><a routerLink="/login">Volver al login</a></p>
            </div>
        </div>
    </div>
</div>
