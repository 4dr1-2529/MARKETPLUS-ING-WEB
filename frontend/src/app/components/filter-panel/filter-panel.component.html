<div class="filter-panel">
    <div class="filter-header">
        <h3><span class="material-icons">filter_list</span> Filtros</h3>
        <button type="button" class="btn-filter-count" *ngIf="activeFilterCount > 0">
            {{ activeFilterCount }} activo{{ activeFilterCount > 1 ? 's' : '' }}
        </button>
    </div>

    <!-- Filtros activos -->
    <div class="active-filters" *ngIf="activeFilters.length">
        <div class="active-filter-tag" *ngFor="let f of activeFilters">
            <span>{{ f.label }}</span>
            <button type="button" (click)="f.clear()" aria-label="Eliminar filtro">
                <span class="material-icons">close</span>
            </button>
        </div>
        <button type="button" class="btn-clear-all" (click)="clearFilters()">
            Limpiar todo
        </button>
    </div>

    <div class="filter-section" *ngIf="categories.length">
        <label class="section-label">Categorias (selecciona varias)</label>
        <div class="category-list">
            <label class="category-item" *ngFor="let c of categories">
                <input type="checkbox" 
                       [checked]="isCategorySelected(c.slug)" 
                       (change)="toggleCategory(c.slug)">
                <span class="checkbox-custom"></span>
                <span class="category-name">{{ getCategoryLabel(c.slug, c.nombre) }}</span>
                <span class="category-count" *ngIf="c.total_productos">{{ c.total_productos }}</span>
            </label>
        </div>
    </div>

    <div class="filter-section">
        <label class="section-label">Marca</label>
        <select [(ngModel)]="selectedBrand" (change)="applyFilters()" [disabled]="!brands.length">
            <option value="">{{ brands.length ? 'Todas las marcas' : 'Elige una categoría' }}</option>
            <option *ngFor="let b of brands" [value]="b.slug">
                {{ b.nombre }} ({{ b.total_productos }})
            </option>
        </select>
    </div>

    <div class="filter-section">
        <label class="section-label">Precio (soles)</label>
        <div class="price-range">
            <input type="number" [(ngModel)]="minPrice" placeholder="Mín" min="0" (change)="applyFilters()">
            <span>—</span>
            <input type="number" [(ngModel)]="maxPrice" placeholder="Máx" min="0" (change)="applyFilters()">
        </div>
    </div>

    <div class="filter-section">
        <label class="section-label">Ordenar</label>
        <select [(ngModel)]="sort" (change)="applyFilters()">
            <option value="newest">Más recientes</option>
            <option value="popular">Más vendidos</option>
            <option value="price_asc">Precio: menor a mayor</option>
            <option value="price_desc">Precio: mayor a menor</option>
            <option value="name_asc">Nombre: A → Z</option>
        </select>
    </div>

    <button type="button" class="btn-clear" (click)="clearFilters()">
        <span class="material-icons">clear_all</span> Limpiar filtros
    </button>
</div>
