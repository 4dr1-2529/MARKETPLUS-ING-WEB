<article class="product-card" (click)="goToProduct()">
    <div class="product-image-wrap">
        <span class="badge-discount" *ngIf="product.descuento_porcentaje">-{{ product.descuento_porcentaje }}%</span>
        <button type="button" class="btn-favorite" (click)="toggleFavorite($event)" aria-label="Favorito">
            <span class="material-icons">{{ isFavorite ? 'favorite' : 'favorite_border' }}</span>
        </button>
        <img [src]="imageUrl" [alt]="product.nombre" loading="lazy" (error)="onImageError()">
    </div>

    <div class="product-body">
        <span class="product-category">{{ categoryLabelUpper }}</span>
        <h3 class="product-name">{{ product.nombre }}</h3>
        <p class="product-desc" *ngIf="shortDescription">{{ shortDescription }}</p>

        <div class="product-footer">
            <div class="product-price">
                <span class="price-current">S/ {{ displayPrice | number:'1.0-0' }}</span>
                <span class="price-original" *ngIf="product.precio_oferta">S/ {{ product.precio | number:'1.0-0' }}</span>
            </div>
            <button type="button" class="btn-cart-float" (click)="addToCart($event)" aria-label="Agregar al carrito">
                <span class="material-icons">add_shopping_cart</span>
            </button>
        </div>
    </div>
</article>
