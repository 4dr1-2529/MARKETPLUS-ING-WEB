<div class="auth-page">
    <div class="auth-container auth-container-lg">
        <div class="auth-card animate-scale">
            <div class="auth-header">
                <a routerLink="/" class="auth-logo">
                    <span class="material-icons">storefront</span>
                    <span>Market<span class="highlight">Plus</span></span>
                </a>
                <h2>Crea tu cuenta</h2>
                <p>Registrate para empezar a comprar</p>
            </div>

            <form (ngSubmit)="register()" class="auth-form">
                <div *ngIf="error" class="alert-error">
                    <span class="material-icons">error</span>
                    <p>{{ error }}</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nombres</label>
                        <input type="text" [(ngModel)]="nombres" name="nombres" class="form-control" placeholder="Tus nombres" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Apellidos</label>
                        <input type="text" [(ngModel)]="apellidos" name="apellidos" class="form-control" placeholder="Tus apellidos" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" [(ngModel)]="email" name="email" class="form-control" placeholder="tu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">DNI (opcional)</label>
                        <input type="text" [(ngModel)]="dni" name="dni" class="form-control" placeholder="12345678">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefono (opcional)</label>
                        <input type="text" [(ngModel)]="telefono" name="telefono" class="form-control" placeholder="999888777">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" [(ngModel)]="password" name="password" class="form-control" placeholder="Minimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="form-control" placeholder="Repite tu contraseña" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-small"></span>
                    {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesion</a></p>
            </div>
        </div>
    </div>
</div>
