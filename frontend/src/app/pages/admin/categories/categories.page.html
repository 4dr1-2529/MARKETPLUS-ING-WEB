<div class="admin-page">
    <app-sidebar></app-sidebar>
    <div class="admin-content">
        <div class="admin-header">
            <div>
                <h1>Gestion de Categorias</h1>
                <p>Administra las categorias de productos</p>
            </div>
            <button type="button" class="btn btn-primary" (click)="openNew()">
                <span class="material-icons">add</span>
                Nueva Categoria
            </button>
        </div>

        <div class="admin-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Slug</th>
                            <th>Descripcion</th>
                            <th>Productos</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let c of categories">
                            <td>{{ c.id }}</td>
                            <td><strong>{{ c.nombre }}</strong></td>
                            <td><code>{{ c.slug }}</code></td>
                            <td>{{ c.descripcion || '-' }}</td>
                            <td><span class="badge badge-info">{{ c.total_productos || 0 }}</span></td>
                            <td>
                                <span class="badge badge-{{ c.estado === 'activo' ? 'success' : 'danger' }}">
                                    {{ c.estado }}
                                </span>
                            </td>
                            <td class="actions-cell">
                                <button type="button" class="btn-icon btn-icon-edit" (click)="openEdit(c)" title="Editar">
                                    <span class="material-icons">edit</span>
                                </button>
                                <button type="button" class="btn-icon btn-icon-delete" (click)="deleteCategory(c)" title="Eliminar">
                                    <span class="material-icons">delete</span>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="admin-modal-overlay" *ngIf="showModal" (click)="closeModal()">
        <div class="admin-modal" (click)="$event.stopPropagation()">
            <h2>{{ isNew ? 'Nueva categoria' : 'Editar categoria' }}</h2>
            <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" [(ngModel)]="form.nombre">
            </div>
            <div class="form-group">
                <label class="form-label">Descripcion</label>
                <textarea class="form-control" rows="3" [(ngModel)]="form.descripcion"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Estado</label>
                <select class="form-control" [(ngModel)]="form.estado">
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>
            <div class="admin-modal-footer">
                <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="save()">Guardar</button>
            </div>
        </div>
    </div>
</div>
