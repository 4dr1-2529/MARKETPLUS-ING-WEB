<div class="admin-page">
    <app-sidebar></app-sidebar>
    <div class="admin-content">
        <div class="admin-header">
            <div>
                <h1>Gestion de Marcas</h1>
                <p>Administra las marcas de productos</p>
            </div>
            <button type="button" class="btn btn-primary" (click)="openNew()">
                <span class="material-icons">add</span>
                Nueva Marca
            </button>
        </div>

        <div class="admin-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Slug</th>
                            <th>Pais de Origen</th>
                            <th>Sitio Web</th>
                            <th>Productos</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let b of brands">
                            <td>{{ b.id }}</td>
                            <td><strong>{{ b.nombre }}</strong></td>
                            <td><code>{{ b.slug }}</code></td>
                            <td>{{ b.pais_origen || '-' }}</td>
                            <td *ngIf="b.sitio_web"><a [href]="b.sitio_web" target="_blank" class="link-primary">{{ b.sitio_web }}</a></td>
                            <td *ngIf="!b.sitio_web">-</td>
                            <td><span class="badge badge-info">{{ b.total_productos || 0 }}</span></td>
                            <td>
                                <span class="badge badge-{{ b.estado === 'activo' ? 'success' : 'danger' }}">{{ b.estado }}</span>
                            </td>
                            <td class="actions-cell">
                                <button type="button" class="btn-icon btn-icon-edit" (click)="openEdit(b)" title="Editar">
                                    <span class="material-icons">edit</span>
                                </button>
                                <button type="button" class="btn-icon btn-icon-delete" (click)="deleteBrand(b)" title="Eliminar">
                                    <span class="material-icons">delete</span>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="admin-modal-overlay" *ngIf="showModal" (click)="!saving && closeModal()">
        <div class="admin-modal" (click)="$event.stopPropagation()">
            <h2>{{ isNew ? 'Nueva marca' : 'Editar marca' }}</h2>
            <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" [(ngModel)]="form.nombre">
            </div>
            <div class="form-group">
                <label class="form-label">Pais de origen</label>
                <input type="text" class="form-control" [(ngModel)]="form.pais_origen">
            </div>
            <div class="form-group">
                <label class="form-label">Sitio web</label>
                <input type="text" class="form-control" [(ngModel)]="form.sitio_web">
            </div>
            <div class="form-group">
                <label class="form-label">Estado</label>
                <select class="form-control" [(ngModel)]="form.estado">
                    <option value="activo">activo</option>
                    <option value="inactivo">inactivo</option>
                </select>
            </div>
            <div class="admin-modal-footer">
                <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="save()" [disabled]="saving">
                    {{ saving ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>
        </div>
    </div>
</div>
