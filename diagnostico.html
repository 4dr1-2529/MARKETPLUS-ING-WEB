<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPlus - Diagnóstico API</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .test { margin: 10px 0; padding: 15px; border-radius: 8px; }
        .ok { background: #064e3b; border: 1px solid #10b981; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; }
        .pending { background: #1e3a5f; border: 1px solid #3b82f6; }
        h2 { color: #38bdf8; }
        pre { background: #1e293b; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
        .product { padding: 8px; margin: 4px 0; background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔍 MarketPlus - Diagnóstico de Conexión</h1>
    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const results = document.getElementById('results');

        async function test(name, url, transform) {
            const div = document.createElement('div');
            div.className = 'test pending';
            div.innerHTML = `<strong>⏳ ${name}</strong><br><small>${url}</small>`;
            results.appendChild(div);

            try {
                const response = await fetch(url, { mode: 'cors' });
                const data = await response.json();
                const result = transform ? transform(data) : data;
                
                div.className = 'test ok';
                div.innerHTML = `<strong>✅ ${name}</strong> (Status: ${response.status})<pre>${JSON.stringify(result, null, 2).substring(0, 2000)}</pre>`;
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = `<strong>❌ ${name}</strong><br><small>Error: ${error.message}</small><br><small>Verifica que el backend esté corriendo en ${API_URL}</small>`;
            }
        }

        async function runTests() {
            await test('1. API Products (todos)', `${API_URL}/products?page=1&limit=5`, (data) => {
                return {
                    success: data.success,
                    total: data.pagination?.total,
                    products: data.data?.map(p => ({ nombre: p.nombre, precio: p.precio, categoria: p.categoria }))
                };
            });

            await test('2. API Products (destacados)', `${API_URL}/products/destacados`, (data) => {
                return { success: data.success, count: data.data?.length };
            });

            await test('3. API Categories', `${API_URL}/categories?con_productos=1`, (data) => {
                return { success: data.success, count: data.data?.length, categories: data.data?.map(c => ({ nombre: c.nombre, slug: c.slug, total: c.total_productos })) };
            });

            await test('4. API Brands', `${API_URL}/brands`, (data) => {
                return { success: data.success, count: data.data?.length };
            });

            await test('5. API Products (con filtros)', `${API_URL}/products?page=1&limit=3&sort=newest`, (data) => {
                return { success: data.success, total: data.pagination?.total, products: data.data?.length };
            });
        }

        runTests();
    </script>
</body>
</html>
